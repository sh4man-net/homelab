apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiobookshelf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audiobookshelf
  template:
    metadata:
      labels:
        app: audiobookshelf
    spec:
      # securityContext:
      #   fsGroup: 33 # www-data group ID
      #   runAsUser: 33 # www-data user ID
      #   runAsGroup: 33 # www-data group ID
      containers:
        - name: audiobookshelf
          image: ghcr.io/advplyr/audiobookshelf:latest
          envFrom:
            - configMapRef:
                name: audiobookshelf-configmap
            # - secretRef:
            #     name: linkding-container-env
          #     securityContext:
          #       allowPrivilegeEscalation: false
          volumeMounts:
            - name: audiobookshelf-audiobooks
              mountPath: /audiobooks
            - name: audiobookshelf-config
              mountPath: /config
            - name: audiobookshelf-metadata
              mountPath: /metadata
      volumes:
        - name: audiobookshelf-audiobooks
          persistentVolumeClaim:
            claimName: linkding-audiobooks-pvc
        - name: audiobookshelf-config
          persistentVolumeClaim:
            claimName: linkding-config-pvc
        - name: audiobookshelf-metadata
          persistentVolumeClaim:
            claimName: linkding-metadata-pvc
